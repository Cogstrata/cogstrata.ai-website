<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162640;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1d33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowCenter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#91c1ff" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid5)" opacity="0.08"/>

  <!-- Central hub (large amber node) -->
  <g filter="url(#glowCenter)">
    <circle cx="600" cy="315" r="50" fill="none" stroke="#EF9F27" stroke-width="3" opacity="0.8"/>
    <circle cx="600" cy="315" r="25" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.6"/>
    <circle cx="600" cy="315" r="8" fill="#EF9F27" opacity="0.9"/>
  </g>

  <!-- Use Case 1: Top - Blue cluster -->
  <!-- Position: top center -->
  <g filter="url(#glow5)">
    <!-- Cluster 1 - Top -->
    <circle cx="600" cy="100" r="30" fill="none" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>
    <circle cx="570" cy="80" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="630" cy="80" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="600" cy="120" r="5" fill="#3E77FF" opacity="0.8"/>
    <!-- Internal connections -->
    <line x1="570" y1="80" x2="630" y2="80" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="570" y1="80" x2="600" y2="120" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="630" y1="80" x2="600" y2="120" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <!-- Connection to center -->
    <line x1="600" y1="130" x2="600" y2="265" stroke="#3E77FF" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Use Case 2: Top-Right - Amber cluster -->
  <!-- Position: ~137 degrees -->
  <g filter="url(#glow5)">
    <circle cx="810" cy="150" r="30" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.7"/>
    <circle cx="830" cy="130" r="5" fill="#EF9F27" opacity="0.8"/>
    <circle cx="825" cy="175" r="5" fill="#EF9F27" opacity="0.8"/>
    <circle cx="780" cy="165" r="5" fill="#EF9F27" opacity="0.8"/>
    <!-- Internal connections -->
    <line x1="830" y1="130" x2="825" y2="175" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <line x1="825" y1="175" x2="780" y2="165" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <line x1="780" y1="165" x2="830" y2="130" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <!-- Connection to center -->
    <line x1="785" y1="180" x2="640" y2="270" stroke="#EF9F27" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Use Case 3: Bottom-Right - Blue cluster -->
  <!-- Position: ~275 degrees -->
  <g filter="url(#glow5)">
    <circle cx="810" cy="480" r="30" fill="none" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>
    <circle cx="830" cy="500" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="825" cy="455" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="780" cy="465" r="5" fill="#3E77FF" opacity="0.8"/>
    <!-- Internal connections -->
    <line x1="830" y1="500" x2="825" y2="455" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="825" y1="455" x2="780" y2="465" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="780" y1="465" x2="830" y2="500" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <!-- Connection to center -->
    <line x1="785" y1="450" x2="640" y2="360" stroke="#3E77FF" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Use Case 4: Bottom-Left - Amber cluster -->
  <!-- Position: ~213 degrees -->
  <g filter="url(#glow5)">
    <circle cx="390" cy="480" r="30" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.7"/>
    <circle cx="370" cy="500" r="5" fill="#EF9F27" opacity="0.8"/>
    <circle cx="375" cy="455" r="5" fill="#EF9F27" opacity="0.8"/>
    <circle cx="420" cy="465" r="5" fill="#EF9F27" opacity="0.8"/>
    <!-- Internal connections -->
    <line x1="370" y1="500" x2="375" y2="455" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <line x1="375" y1="455" x2="420" y2="465" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <line x1="420" y1="465" x2="370" y2="500" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <!-- Connection to center -->
    <line x1="415" y1="450" x2="560" y2="360" stroke="#EF9F27" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Use Case 5: Top-Left - Blue cluster -->
  <!-- Position: ~51 degrees -->
  <g filter="url(#glow5)">
    <circle cx="390" cy="150" r="30" fill="none" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>
    <circle cx="370" cy="130" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="375" cy="175" r="5" fill="#3E77FF" opacity="0.8"/>
    <circle cx="420" cy="165" r="5" fill="#3E77FF" opacity="0.8"/>
    <!-- Internal connections -->
    <line x1="370" y1="130" x2="375" y2="175" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="375" y1="175" x2="420" y2="165" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <line x1="420" y1="165" x2="370" y2="130" stroke="#3E77FF" stroke-width="1" opacity="0.5"/>
    <!-- Connection to center -->
    <line x1="415" y1="180" x2="560" y2="270" stroke="#3E77FF" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Star/Pentagon outline connecting all clusters (subtle) -->
  <g opacity="0.15">
    <polygon points="600,100 810,150 810,480 390,480 390,150"
             fill="none" stroke="#91c1ff" stroke-width="1"/>
  </g>

</svg>