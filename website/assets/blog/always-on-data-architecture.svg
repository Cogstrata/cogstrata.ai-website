<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060e1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3E77FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF9F27;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad3)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#91c1ff" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="0" />
    <line x1="0" y1="30" x2="1200" y2="30" />
    <line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="90" x2="1200" y2="90" />
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="270" x2="1200" y2="270" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="330" x2="1200" y2="330" />
    <line x1="0" y1="360" x2="1200" y2="360" />
    <line x1="0" y1="390" x2="1200" y2="390" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="0" y1="480" x2="1200" y2="480" />
    <line x1="0" y1="510" x2="1200" y2="510" />
    <line x1="0" y1="540" x2="1200" y2="540" />
    <line x1="0" y1="570" x2="1200" y2="570" />
    <line x1="0" y1="600" x2="1200" y2="600" />
    <line x1="0" y1="630" x2="1200" y2="630" />

    <line x1="0" y1="0" x2="0" y2="630" />
    <line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" />
    <line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" />
    <line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" />
    <line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" />
    <line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" />
    <line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" />
    <line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="1200" y1="0" x2="1200" y2="630" />
  </g>

  <!-- LEFT SIDE: Batch/discrete blocky shapes (purple) -->
  <g opacity="0.7">
    <rect x="120" y="150" width="50" height="50" fill="#534AB7" opacity="0.6"/>
    <rect x="120" y="240" width="50" height="50" fill="#534AB7" opacity="0.5"/>
    <rect x="120" y="330" width="50" height="50" fill="#534AB7" opacity="0.4"/>
    <rect x="240" y="190" width="50" height="50" fill="#534AB7" opacity="0.5"/>
    <rect x="240" y="280" width="50" height="50" fill="#534AB7" opacity="0.6"/>
    <rect x="240" y="370" width="50" height="50" fill="#534AB7" opacity="0.45"/>
  </g>

  <!-- Spacing between batch blocks to show discreteness -->
  <line x1="180" y1="120" x2="180" y2="160" stroke="#534AB7" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="210" x2="180" y2="240" stroke="#534AB7" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="300" x2="180" y2="330" stroke="#534AB7" stroke-width="1" opacity="0.3"/>

  <!-- RIGHT SIDE: Flowing continuous curves with gradient (blue to amber) -->
  <!-- Main flow path as multiple curves -->
  <path d="M 600 150 Q 750 180 900 200 T 1100 250" stroke="url(#flowGrad)" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M 600 250 Q 750 280 900 300 T 1100 350" stroke="url(#flowGrad)" stroke-width="4" fill="none" opacity="0.65"/>
  <path d="M 600 350 Q 750 370 900 390 T 1100 430" stroke="url(#flowGrad)" stroke-width="4" fill="none" opacity="0.6"/>

  <!-- Pulse dots on flow lines (animated look through layering) -->
  <!-- Top flow pulse points -->
  <circle cx="650" cy="160" r="6" fill="#3E77FF" opacity="0.8"/>
  <circle cx="750" cy="178" r="6" fill="#3E77FF" opacity="0.6"/>
  <circle cx="850" cy="195" r="6" fill="#91c1ff" opacity="0.5"/>
  <circle cx="950" cy="213" r="6" fill="#EF9F27" opacity="0.7"/>
  <circle cx="1050" cy="232" r="6" fill="#EF9F27" opacity="0.85"/>

  <!-- Middle flow pulse points -->
  <circle cx="650" cy="260" r="6" fill="#3E77FF" opacity="0.75"/>
  <circle cx="750" cy="278" r="6" fill="#3E77FF" opacity="0.55"/>
  <circle cx="850" cy="295" r="6" fill="#91c1ff" opacity="0.48"/>
  <circle cx="950" cy="313" r="6" fill="#EF9F27" opacity="0.65"/>
  <circle cx="1050" cy="332" r="6" fill="#EF9F27" opacity="0.8"/>

  <!-- Bottom flow pulse points -->
  <circle cx="650" cy="360" r="6" fill="#3E77FF" opacity="0.7"/>
  <circle cx="750" cy="378" r="6" fill="#3E77FF" opacity="0.5"/>
  <circle cx="850" cy="395" r="6" fill="#91c1ff" opacity="0.45"/>
  <circle cx="950" cy="413" r="6" fill="#EF9F27" opacity="0.6"/>
  <circle cx="1050" cy="432" r="6" fill="#EF9F27" opacity="0.75"/>

  <!-- Transition zone: some blocky shapes morphing into curves -->
  <path d="M 380 200 L 420 200 Q 450 220 480 240" stroke="#534AB7" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 380 300 L 420 300 Q 450 320 480 340" stroke="#534AB7" stroke-width="2" fill="none" opacity="0.45"/>
  <rect x="380" y="380" width="40" height="40" fill="none" stroke="#534AB7" stroke-width="2" opacity="0.4"/>

  <!-- Visual divider between batch and always-on -->
  <line x1="550" y1="100" x2="550" y2="530" stroke="#91c1ff" stroke-width="1" opacity="0.15" stroke-dasharray="4,6"/>
</svg>