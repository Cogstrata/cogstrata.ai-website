<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162640;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1d33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowAmber">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#91c1ff" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid4)" opacity="0.08"/>

  <!-- BELOW/BEHIND: Chaotic unchecked data streams (purple) -->
  <g opacity="0.4">
    <!-- Chaotic tangled lines -->
    <path d="M 250 150 Q 400 200 350 350 T 450 450" fill="none" stroke="#534AB7" stroke-width="2" opacity="0.6"/>
    <path d="M 300 100 Q 450 250 400 450" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.5"/>
    <path d="M 350 200 Q 500 300 480 500" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.5"/>
    <path d="M 200 300 Q 380 350 420 480" fill="none" stroke="#534AB7" stroke-width="2" opacity="0.6"/>
    <path d="M 280 50 Q 450 180 500 420" fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.5"/>

    <!-- Chaotic nodes -->
    <circle cx="350" cy="350" r="4" fill="#534AB7" opacity="0.6"/>
    <circle cx="400" cy="450" r="4" fill="#534AB7" opacity="0.6"/>
    <circle cx="450" cy="250" r="4" fill="#534AB7" opacity="0.5"/>
    <circle cx="480" cy="500" r="4" fill="#534AB7" opacity="0.6"/>
    <circle cx="420" cy="480" r="4" fill="#534AB7" opacity="0.5"/>
    <circle cx="500" cy="420" r="4" fill="#534AB7" opacity="0.6"/>
  </g>

  <!-- CENTER: Trust Shield (Diamond/Hexagon with glow) -->
  <g filter="url(#glowAmber)">
    <!-- Outer hexagon for shield shape -->
    <polygon points="600,200 700,260 700,380 600,440 500,380 500,260"
             fill="#EF9F27" opacity="0.15" stroke="#EF9F27" stroke-width="3"/>

    <!-- Inner hexagon outline -->
    <polygon points="600,220 685,270 685,370 600,420 515,370 515,270"
             fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.9"/>

    <!-- Shield center core -->
    <circle cx="600" cy="315" r="30" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.8"/>
    <circle cx="600" cy="315" r="15" fill="#EF9F27" opacity="0.7"/>

    <!-- Decorative shield crosshatch -->
    <line x1="570" y1="290" x2="630" y2="340" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
    <line x1="630" y1="290" x2="570" y2="340" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ABOVE/IN FRONT: Clean verified data streams (blue) -->
  <g filter="url(#glow4)">
    <!-- Straight, organized data lines -->
    <!-- Top clean paths -->
    <line x1="300" y1="80" x2="550" y2="180" stroke="#3E77FF" stroke-width="2.5" opacity="0.8"/>
    <line x1="350" y1="60" x2="570" y2="150" stroke="#91c1ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="400" y1="70" x2="580" y2="160" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>

    <!-- Clean nodes on top paths -->
    <circle cx="320" cy="90" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="400" cy="150" r="4" fill="#91c1ff" opacity="0.8"/>
    <circle cx="480" cy="180" r="3" fill="#3E77FF" opacity="0.7"/>
    <circle cx="550" cy="180" r="4" fill="#3E77FF" opacity="0.8"/>

    <!-- Right side clean paths -->
    <line x1="650" y1="180" x2="900" y2="80" stroke="#91c1ff" stroke-width="2.5" opacity="0.8"/>
    <line x1="630" y1="150" x2="850" y2="60" stroke="#3E77FF" stroke-width="2.5" opacity="0.7"/>
    <line x1="620" y1="160" x2="820" y2="70" stroke="#91c1ff" stroke-width="2" opacity="0.7"/>

    <!-- Clean nodes on right paths -->
    <circle cx="880" cy="90" r="4" fill="#91c1ff" opacity="0.8"/>
    <circle cx="800" cy="150" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="720" cy="180" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="650" cy="180" r="4" fill="#3E77FF" opacity="0.8"/>

    <!-- Bottom clean paths -->
    <line x1="300" y1="550" x2="550" y2="450" stroke="#3E77FF" stroke-width="2.5" opacity="0.8"/>
    <line x1="350" y1="570" x2="570" y2="480" stroke="#91c1ff" stroke-width="2.5" opacity="0.7"/>
    <line x1="400" y1="560" x2="580" y2="470" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>

    <!-- Clean nodes on bottom paths -->
    <circle cx="320" cy="540" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="400" cy="480" r="4" fill="#91c1ff" opacity="0.8"/>
    <circle cx="480" cy="450" r="3" fill="#3E77FF" opacity="0.7"/>
    <circle cx="550" cy="450" r="4" fill="#3E77FF" opacity="0.8"/>

    <!-- Bottom right clean paths -->
    <line x1="650" y1="450" x2="900" y2="550" stroke="#91c1ff" stroke-width="2.5" opacity="0.8"/>
    <line x1="630" y1="480" x2="850" y2="570" stroke="#3E77FF" stroke-width="2.5" opacity="0.7"/>
    <line x1="620" y1="470" x2="820" y2="560" stroke="#91c1ff" stroke-width="2" opacity="0.7"/>

    <!-- Clean nodes on bottom right paths -->
    <circle cx="880" cy="540" r="4" fill="#91c1ff" opacity="0.8"/>
    <circle cx="800" cy="480" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="720" cy="450" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="650" cy="450" r="4" fill="#3E77FF" opacity="0.8"/>
  </g>

  <!-- Output nodes (far left and right) showing filtered data -->
  <circle cx="150" cy="90" r="5" fill="#3E77FF" opacity="0.8"/>
  <circle cx="150" cy="150" r="5" fill="#91c1ff" opacity="0.8"/>
  <circle cx="150" cy="180" r="5" fill="#3E77FF" opacity="0.8"/>
  <circle cx="150" cy="540" r="5" fill="#3E77FF" opacity="0.8"/>
  <circle cx="150" cy="480" r="5" fill="#91c1ff" opacity="0.8"/>
  <circle cx="150" cy="450" r="5" fill="#3E77FF" opacity="0.8"/>

  <circle cx="1050" cy="90" r="5" fill="#91c1ff" opacity="0.8"/>
  <circle cx="1050" cy="150" r="5" fill="#3E77FF" opacity="0.8"/>
  <circle cx="1050" cy="180" r="5" fill="#91c1ff" opacity="0.8"/>
  <circle cx="1050" cy="540" r="5" fill="#91c1ff" opacity="0.8"/>
  <circle cx="1050" cy="480" r="5" fill="#3E77FF" opacity="0.8"/>
  <circle cx="1050" cy="450" r="5" fill="#91c1ff" opacity="0.8"/>

</svg>