<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162640;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1d33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#91c1ff" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid3)" opacity="0.08"/>

  <!-- LEFT: API Endpoint -->
  <g filter="url(#glow3)">
    <!-- API box -->
    <rect x="80" y="250" width="100" height="130" fill="none" stroke="#3E77FF" stroke-width="2" opacity="0.8" rx="4"/>
    <!-- Connection dots on API endpoint -->
    <circle cx="180" cy="285" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="180" cy="315" r="4" fill="#3E77FF" opacity="0.8"/>
    <circle cx="180" cy="345" r="4" fill="#3E77FF" opacity="0.8"/>
    <!-- Request arrows from API -->
    <line x1="100" y1="285" x2="80" y2="280" stroke="#3E77FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="100" y1="315" x2="80" y2="320" stroke="#3E77FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="100" y1="345" x2="80" y2="360" stroke="#3E77FF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- CENTER: Data Pipeline Channels -->
  <g filter="url(#glow3)">
    <!-- Three parallel data channels flowing -->
    <!-- Top channel -->
    <line x1="200" y1="250" x2="450" y2="250" stroke="#3E77FF" stroke-width="3" opacity="0.5"/>
    <circle cx="250" cy="250" r="3" fill="#3E77FF" opacity="0.8"/>
    <circle cx="300" cy="250" r="3" fill="#3E77FF" opacity="0.8"/>
    <circle cx="350" cy="250" r="3" fill="#3E77FF" opacity="0.8"/>
    <circle cx="400" cy="250" r="3" fill="#3E77FF" opacity="0.8"/>

    <!-- Middle channel -->
    <line x1="200" y1="315" x2="450" y2="315" stroke="#91c1ff" stroke-width="3" opacity="0.6"/>
    <circle cx="250" cy="315" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="300" cy="315" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="350" cy="315" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="400" cy="315" r="3" fill="#91c1ff" opacity="0.8"/>

    <!-- Bottom channel -->
    <line x1="200" y1="380" x2="450" y2="380" stroke="#91c1ff" stroke-width="3" opacity="0.5"/>
    <circle cx="250" cy="380" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="300" cy="380" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="350" cy="380" r="3" fill="#91c1ff" opacity="0.8"/>
    <circle cx="400" cy="380" r="3" fill="#91c1ff" opacity="0.8"/>

    <!-- Converging arrows to agent -->
    <line x1="450" y1="250" x2="520" y2="290" stroke="#3E77FF" stroke-width="2" opacity="0.6"/>
    <line x1="450" y1="315" x2="520" y2="315" stroke="#91c1ff" stroke-width="2" opacity="0.6"/>
    <line x1="450" y1="380" x2="520" y2="340" stroke="#91c1ff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- RIGHT CENTER: Agent Node (large circle) -->
  <g filter="url(#glow3)">
    <circle cx="650" cy="315" r="70" fill="none" stroke="#534AB7" stroke-width="3" opacity="0.7"/>
    <circle cx="650" cy="315" r="35" fill="none" stroke="#534AB7" stroke-width="2" opacity="0.5"/>
    <circle cx="650" cy="315" r="10" fill="#534AB7" opacity="0.8"/>
  </g>

  <!-- RIGHT: Action Paths Radiating from Agent -->
  <!-- Action path 1 - Northeast -->
  <g filter="url(#glow3)">
    <line x1="700" y1="260" x2="850" y2="120" stroke="#EF9F27" stroke-width="2" opacity="0.7"/>
    <circle cx="720" cy="245" r="3" fill="#EF9F27" opacity="0.7"/>
    <circle cx="780" cy="180" r="3" fill="#EF9F27" opacity="0.7"/>
    <circle cx="850" cy="120" r="6" fill="#EF9F27" opacity="0.7"/>
  </g>

  <!-- Action path 2 - North -->
  <g filter="url(#glow3)">
    <line x1="650" y1="245" x2="650" y2="80" stroke="#3E77FF" stroke-width="2" opacity="0.7"/>
    <circle cx="650" cy="215" r="3" fill="#3E77FF" opacity="0.7"/>
    <circle cx="650" cy="150" r="3" fill="#3E77FF" opacity="0.7"/>
    <circle cx="650" cy="80" r="6" fill="#3E77FF" opacity="0.7"/>
  </g>

  <!-- Action path 3 - Northwest -->
  <g filter="url(#glow3)">
    <line x1="600" y1="260" x2="450" y2="120" stroke="#91c1ff" stroke-width="2" opacity="0.7"/>
    <circle cx="580" cy="245" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="520" cy="180" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="450" cy="120" r="6" fill="#91c1ff" opacity="0.7"/>
  </g>

  <!-- Action path 4 - Southeast -->
  <g filter="url(#glow3)">
    <line x1="700" y1="370" x2="850" y2="510" stroke="#534AB7" stroke-width="2" opacity="0.7"/>
    <circle cx="720" cy="385" r="3" fill="#534AB7" opacity="0.7"/>
    <circle cx="780" cy="450" r="3" fill="#534AB7" opacity="0.7"/>
    <circle cx="850" cy="510" r="6" fill="#534AB7" opacity="0.7"/>
  </g>

  <!-- Action path 5 - South -->
  <g filter="url(#glow3)">
    <line x1="650" y1="385" x2="650" y2="550" stroke="#EF9F27" stroke-width="2" opacity="0.7"/>
    <circle cx="650" cy="415" r="3" fill="#EF9F27" opacity="0.7"/>
    <circle cx="650" cy="480" r="3" fill="#EF9F27" opacity="0.7"/>
    <circle cx="650" cy="550" r="6" fill="#EF9F27" opacity="0.7"/>
  </g>

  <!-- Action path 6 - Southwest -->
  <g filter="url(#glow3)">
    <line x1="600" y1="370" x2="450" y2="510" stroke="#91c1ff" stroke-width="2" opacity="0.7"/>
    <circle cx="580" cy="385" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="520" cy="450" r="3" fill="#91c1ff" opacity="0.7"/>
    <circle cx="450" cy="510" r="6" fill="#91c1ff" opacity="0.7"/>
  </g>

  <!-- Far right: Secondary endpoint nodes -->
  <circle cx="1050" cy="120" r="5" fill="#EF9F27" opacity="0.7"/>
  <circle cx="1050" cy="80" r="5" fill="#3E77FF" opacity="0.7"/>
  <circle cx="1050" cy="120" r="5" fill="#91c1ff" opacity="0.7"/>
  <circle cx="1050" cy="510" r="5" fill="#534AB7" opacity="0.7"/>
  <circle cx="1050" cy="550" r="5" fill="#EF9F27" opacity="0.7"/>
  <circle cx="1050" cy="510" r="5" fill="#91c1ff" opacity="0.7"/>

</svg>