  <line x1="730" y1="310" x2="1060" y2="310" stroke="#3E77FF" stroke-width="0.8" opacity="0.3"/>

  <!-- Small scatter plot -->
  <circle cx="770" cy="370" r="5" fill="#EF9F27" opacity="0.7"/>
  <circle cx="820" cy="345" r="7" fill="#EF9F27" opacity="0.8"/>
  <circle cx="870" cy="390" r="4" fill="#3E77FF" opacity="0.7"/>
  <circle cx="920" cy="355" r="6" fill="#EF9F27" opacity="0.6"/>
  <circle cx="970" cy="340" r="8" fill="#EF9F27" opacity="0.9"/>
  <circle cx="1020" cy="365" r="5" fill="#3E77FF" opacity="0.7"/>
  <!-- Trend line -->
  <line x1="760" y1="380" x2="1040" y2="330" stroke="#EF9F27" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,3"/>

