  <circle cx="450" cy="340" r="10" fill="#EF9F27" opacity="0.9"/>
  <line x1="450" y1="340" x2="450" y2="365" stroke="#EF9F27" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="420" r="8" fill="#EF9F27" opacity="0.7"/>
  <line x1="250" y1="420" x2="250" y2="440" stroke="#EF9F27" stroke-width="1.5" opacity="0.5"/>

