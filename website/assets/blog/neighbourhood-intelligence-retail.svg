    <line x1="0" y1="0" x2="0" y2="630" /><line x1="120" y1="0" x2="120" y2="630" /><line x1="240" y1="0" x2="240" y2="630" /><line x1="360" y1="0" x2="360" y2="630" /><line x1="480" y1="0" x2="480" y2="630" /><line x1="600" y1="0" x2="600" y2="630" /><line x1="720" y1="0" x2="720" y2="630" /><line x1="840" y1="0" x2="840" y2="630" /><line x1="960" y1="0" x2="960" y2="630" /><line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1200" y1="0" x2="1200" y2="630" />
  </g>

  <!-- Postcode grid cells -->
  <g fill="none" stroke="#3E77FF" stroke-width="1" opacity="0.3">
    <rect x="200" y="140" width="100" height="80"/>
    <rect x="300" y="140" width="100" height="80"/>
    <rect x="400" y="140" width="100" height="80"/>
    <rect x="200" y="220" width="100" height="80"/>
    <rect x="300" y="220" width="100" height="80"/>
    <rect x="400" y="220" width="100" height="80"/>
    <rect x="200" y="300" width="100" height="80"/>
    <rect x="300" y="300" width="100" height="80"/>
    <rect x="400" y="300" width="100" height="80"/>
    <rect x="200" y="380" width="100" height="80"/>
    <rect x="300" y="380" width="100" height="80"/>
    <rect x="400" y="380" width="100" height="80"/>
    <rect x="200" y="460" width="100" height="80"/>
    <rect x="300" y="460" width="100" height="80"/>
    <rect x="400" y="460" width="100" height="80"/>
