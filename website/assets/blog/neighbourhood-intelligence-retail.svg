  <!-- Filled cells indicating demographic density -->
  <rect x="300" y="220" width="100" height="80" fill="#3E77FF" opacity="0.18"/>
  <rect x="400" y="300" width="100" height="80" fill="#3E77FF" opacity="0.25"/>
  <rect x="300" y="300" width="100" height="80" fill="#3E77FF" opacity="0.35"/>
  <rect x="200" y="380" width="100" height="80" fill="#3E77FF" opacity="0.15"/>
