  <circle cx="450" cy="340" r="55" fill="none" stroke="#EF9F27" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>

  <!-- Right: insight output panel -->
  <rect x="700" y="140" width="380" height="360" rx="8" fill="#1e3a5f" opacity="0.5"/>
  <rect x="700" y="140" width="380" height="360" rx="8" fill="none" stroke="#3E77FF" stroke-width="1" opacity="0.4"/>

  <!-- Segment bars -->
