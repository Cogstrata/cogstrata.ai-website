  <line x1="510" y1="315" x2="690" y2="315" stroke="#91c1ff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <polygon points="686,308 704,315 686,322" fill="#91c1ff" opacity="0.4"/>
