  <rect x="730" y="228" width="270" height="14" rx="3" fill="#EF9F27" opacity="0.7"/>
  <rect x="730" y="252" width="130" height="14" rx="3" fill="#3E77FF" opacity="0.4"/>
  <rect x="730" y="276" width="200" height="14" rx="3" fill="#EF9F27" opacity="0.5"/>

  <!-- Segment labels dots -->
  <circle cx="720" cy="187" r="4" fill="#3E77FF" opacity="0.9"/>
  <circle cx="720" cy="211" r="4" fill="#3E77FF" opacity="0.7"/>
  <circle cx="720" cy="235" r="4" fill="#EF9F27" opacity="0.9"/>
  <circle cx="720" cy="259" r="4" fill="#3E77FF" opacity="0.6"/>
  <circle cx="720" cy="283" r="4" fill="#EF9F27" opacity="0.7"/>

