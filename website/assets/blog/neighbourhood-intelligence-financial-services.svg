  <circle cx="160" cy="315" r="16" fill="none" stroke="#91c1ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="160" cy="315" r="7" fill="#91c1ff" opacity="0.7"/>
  <circle cx="200" cy="450" r="16" fill="none" stroke="#91c1ff" stroke-width="1.5" opacity="0.7"/>
