  <line x1="216" y1="180" x2="558" y2="298" stroke="#91c1ff" stroke-width="1.2" opacity="0.35"/>
  <line x1="176" y1="315" x2="552" y2="315" stroke="#91c1ff" stroke-width="1.2" opacity="0.35"/>
  <line x1="216" y1="450" x2="558" y2="332" stroke="#91c1ff" stroke-width="1.2" opacity="0.35"/>
