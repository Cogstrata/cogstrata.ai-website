  <circle cx="960" cy="260" r="12" fill="#EF9F27" opacity="0.8"/>
  <circle cx="980" cy="370" r="14" fill="#EF9F27" opacity="0.9"/>
  <circle cx="900" cy="470" r="12" fill="#EF9F27" opacity="0.8"/>
  <circle cx="820" cy="120" r="10" fill="#EF9F27" opacity="0.6"/>
  <circle cx="840" cy="510" r="10" fill="#EF9F27" opacity="0.6"/>

  <!-- Lines from data nodes to hub -->
  <line x1="886" y1="166" x2="643" y2="297" stroke="#EF9F27" stroke-width="1.5" opacity="0.4"/>
  <line x1="948" y1="265" x2="648" y2="308" stroke="#EF9F27" stroke-width="1.5" opacity="0.4"/>
  <line x1="966" y1="364" x2="648" y2="322" stroke="#EF9F27" stroke-width="1.5" opacity="0.4"/>
  <line x1="886" y1="464" x2="643" y2="333" stroke="#EF9F27" stroke-width="1.5" opacity="0.4"/>
  <line x1="810" y1="122" x2="640" y2="279" stroke="#EF9F27" stroke-width="1" opacity="0.25"/>
  <line x1="830" y1="506" x2="640" y2="351" stroke="#EF9F27" stroke-width="1" opacity="0.25"/>

  <!-- Interconnect data nodes -->
  <line x1="900" y1="160" x2="960" y2="260" stroke="#EF9F27" stroke-width="1" opacity="0.3"/>
  <line x1="960" y1="260" x2="980" y2="370" stroke="#EF9F27" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="370" x2="900" y2="470" stroke="#EF9F27" stroke-width="1" opacity="0.3"/>

  <!-- Output decision nodes (approved / referred) -->
  <circle cx="480" cy="480" r="10" fill="#3E77FF" opacity="0.7"/>
  <circle cx="720" cy="480" r="10" fill="#3E77FF" opacity="0.7"/>
  <line x1="590" y1="363" x2="484" y2="472" stroke="#3E77FF" stroke-width="1" opacity="0.3"/>
  <line x1="610" y1="363" x2="716" y2="472" stroke="#3E77FF" stroke-width="1" opacity="0.3"/>

  <!-- Label area: faint postcode grid overlay bottom-left -->
  <rect x="60" y="360" width="80" height="60" fill="none" stroke="#91c1ff" stroke-width="0.5" opacity="0.15"/>
  <rect x="60" y="420" width="80" height="60" fill="none" stroke="#91c1ff" stroke-width="0.5" opacity="0.15"/>
  <rect x="140" y="360" width="80" height="60" fill="none" stroke="#91c1ff" stroke-width="0.5" opacity="0.15"/>
  <rect x="140" y="420" width="80" height="60" fill="none" stroke="#91c1ff" stroke-width="0.5" opacity="0.1"/>
