  <!-- Frozen calendar/clock motif with cracked nodes -->
  <!-- Left side: stale faded nodes (purple at low opacity) -->
  <circle cx="300" cy="150" r="12" fill="#534AB7" opacity="0.2"/>
  <circle cx="450" cy="180" r="10" fill="#534AB7" opacity="0.15"/>
  <circle cx="280" cy="320" r="11" fill="#534AB7" opacity="0.18"/>
  <circle cx="380" cy="380" r="9" fill="#534AB7" opacity="0.12"/>
  <circle cx="200" cy="450" r="10" fill="#534AB7" opacity="0.14"/>

  <!-- Connecting lines between stale nodes (faded) -->
  <line x1="300" y1="150" x2="450" y2="180" stroke="#534AB7" stroke-width="1.5" opacity="0.1"/>
  <line x1="300" y1="150" x2="280" y2="320" stroke="#534AB7" stroke-width="1.5" opacity="0.1"/>
  <line x1="450" y1="180" x2="380" y2="380" stroke="#534AB7" stroke-width="1.5" opacity="0.1"/>
  <line x1="280" y1="320" x2="200" y2="450" stroke="#534AB7" stroke-width="1.5" opacity="0.1"/>

  <!-- Cracked appearance on left nodes -->
  <line x1="295" y1="138" x2="305" y2="162" stroke="#534AB7" stroke-width="0.8" opacity="0.25"/>
  <line x1="445" y1="170" x2="455" y2="190" stroke="#534AB7" stroke-width="0.8" opacity="0.25"/>

  <!-- Right side: fresh bright nodes (amber) breaking through -->
  <circle cx="850" cy="130" r="13" fill="#EF9F27" opacity="0.9"/>
  <circle cx="950" cy="170" r="11" fill="#EF9F27" opacity="0.85"/>
  <circle cx="900" cy="310" r="12" fill="#EF9F27" opacity="0.88"/>
  <circle cx="1000" cy="350" r="10" fill="#EF9F27" opacity="0.82"/>
  <circle cx="850" cy="450" r="12" fill="#EF9F27" opacity="0.9"/>

  <!-- Connecting lines between fresh nodes (bright) -->
  <line x1="850" y1="130" x2="950" y2="170" stroke="#EF9F27" stroke-width="2" opacity="0.6"/>
  <line x1="850" y1="130" x2="900" y2="310" stroke="#EF9F27" stroke-width="2" opacity="0.55"/>
  <line x1="950" y1="170" x2="1000" y2="350" stroke="#EF9F27" stroke-width="2" opacity="0.58"/>
  <line x1="900" y1="310" x2="850" y2="450" stroke="#EF9F27" stroke-width="2" opacity="0.6"/>
  <line x1="1000" y1="350" x2="850" y2="450" stroke="#EF9F27" stroke-width="2" opacity="0.56"/>

  <!-- Center transition area: some nodes transitioning from purple to amber -->
  <circle cx="600" cy="220" r="11" fill="#534AB7" opacity="0.35"/>
  <circle cx="700" cy="280" r="10" fill="#EF9F27" opacity="0.5"/>
  <circle cx="650" cy="400" r="11" fill="#534AB7" opacity="0.4"/>

  <!-- Lines connecting transition nodes -->
  <line x1="600" y1="220" x2="700" y2="280" stroke="#3E77FF" stroke-width="1.5" opacity="0.4"/>
  <line x1="700" y1="280" x2="650" y2="400" stroke="#3E77FF" stroke-width="1.5" opacity="0.35"/>

  <!-- Clock/calendar decorative elements -->
  <rect x="500" y="500" width="200" height="100" fill="none" stroke="#3E77FF" stroke-width="2" opacity="0.3" rx="4"/>
  <line x1="550" y1="520" x2="650" y2="520" stroke="#3E77FF" stroke-width="1" opacity="0.25"/>
  <line x1="550" y1="540" x2="650" y2="540" stroke="#3E77FF" stroke-width="1" opacity="0.25"/>
  <line x1="550" y1="560" x2="650" y2="560" stroke="#3E77FF" stroke-width="1" opacity="0.25"/>
</svg>