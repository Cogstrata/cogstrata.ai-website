  <line x1="700" y1="530" x2="620" y2="470" stroke="#3E77FF" stroke-width="1.5" opacity="0.576"/>
  <line x1="620" y1="470" x2="500" y2="520" stroke="#EF9F27" stroke-width="1.5" opacity="0.54"/>

