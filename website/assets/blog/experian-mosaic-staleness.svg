  <circle cx="600" cy="315" r="6" fill="#91c1ff" opacity="0.36"/>
  <circle cx="620" cy="315" r="6" fill="#91c1ff" opacity="0.36"/>

  <!-- Vertical indicator lines for timeline points -->
  <line x1="200" y1="305" x2="200" y2="325" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
  <line x1="280" y1="305" x2="280" y2="325" stroke="#534AB7" stroke-width="1" opacity="0.48"/>
  <line x1="360" y1="305" x2="360" y2="325" stroke="#534AB7" stroke-width="1" opacity="0.3"/>
