<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradIns" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#162640;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1d33;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="riskHigh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EF9F27;stop-opacity:0.45" />
      <stop offset="100%" style="stop-color:#EF9F27;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="riskLow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3E77FF;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#3E77FF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradIns)"/>

  <!-- Subtle grid -->
  <g stroke="#91c1ff" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="0" x2="1200" y2="0" /><line x1="0" y1="60" x2="1200" y2="60" /><line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="180" x2="1200" y2="180" /><line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="300" x2="1200" y2="300" /><line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="420" x2="1200" y2="420" /><line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="540" x2="1200" y2="540" /><line x1="0" y1="600" x2="1200" y2="600" />
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="120" y1="0" x2="120" y2="630" /><line x1="240" y1="0" x2="240" y2="630" /><line x1="360" y1="0" x2="360" y2="630" /><line x1="480" y1="0" x2="480" y2="630" /><line x1="600" y1="0" x2="600" y2="630" /><line x1="720" y1="0" x2="720" y2="630" /><line x1="840" y1="0" x2="840" y2="630" /><line x1="960" y1="0" x2="960" y2="630" /><line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1200" y1="0" x2="1200" y2="630" />
  </g>

  <!-- Map outline (simplified UK-ish shape) -->
  <rect x="140" y="100" width="460" height="440" rx="4" fill="none" stroke="#3E77FF" stroke-width="0.8" opacity="0.2"/>

  <!-- LSOA grid cells -->
  <g fill="none" stroke="#3E77FF" stroke-width="0.6" opacity="0.25">
    <line x1="220" y1="100" x2="220" y2="540"/><line x1="300" y1="100" x2="300" y2="540"/>
    <line x1="380" y1="100" x2="380" y2="540"/><line x1="460" y1="100" x2="460" y2="540"/>
    <line x1="140" y1="180" x2="600" y2="180"/><line x1="140" y1="260" x2="600" y2="260"/>
    <line x1="140" y1="340" x2="600" y2="340"/><line x1="140" y1="420" x2="600" y2="420"/>
    <line x1="140" y1="460" x2="600" y2="460"/>
  </g>

  <!-- High-risk heat zone -->
  <ellipse cx="340" cy="270" rx="120" ry="100" fill="url(#riskHigh)"/>
  <!-- Low-risk heat zone -->
  <ellipse cx="500" cy="430" rx="90" ry="75" fill="url(#riskLow)"/>

  <!-- Risk zone nodes -->
  <circle cx="310" cy="240" r="6" fill="#EF9F27" opacity="0.85"/>
  <circle cx="370" cy="260" r="7" fill="#EF9F27" opacity="0.9"/>
  <circle cx="330" cy="310" r="5" fill="#EF9F27" opacity="0.75"/>
  <circle cx="480" cy="420" r="6" fill="#3E77FF" opacity="0.85"/>
  <circle cx="510" cy="450" r="5" fill="#3E77FF" opacity="0.75"/>

  <!-- Legend: risk scale -->
  <rect x="155" y="115" width="18" height="18" rx="2" fill="#EF9F27" opacity="0.7"/>
  <rect x="155" y="141" width="18" height="18" rx="2" fill="#3E77FF" opacity="0.7"/>

  <!-- Right panel: premium comparison -->
  <rect x="680" y="120" width="400" height="400" rx="8" fill="#1e3a5f" opacity="0.45"/>
  <rect x="680" y="120" width="400" height="400" rx="8" fill="none" stroke="#3E77FF" stroke-width="1" opacity="0.4"/>

  <!-- Bar chart: neighbourhood risk bands -->
  <!-- Bars -->
  <rect x="720" y="340" width="40" height="120" rx="3" fill="#3E77FF" opacity="0.6"/>
  <rect x="780" y="280" width="40" height="180" rx="3" fill="#3E77FF" opacity="0.7"/>
  <rect x="840" y="220" width="40" height="240" rx="3" fill="#EF9F27" opacity="0.65"/>
  <rect x="900" y="190" width="40" height="270" rx="3" fill="#EF9F27" opacity="0.8"/>
  <rect x="960" y="250" width="40" height="210" rx="3" fill="#EF9F27" opacity="0.55"/>

  <!-- Baseline -->
  <line x1="710" y1="460" x2="1020" y2="460" stroke="#91c1ff" stroke-width="1" opacity="0.4"/>

  <!-- Horizontal guide lines -->
  <line x1="710" y1="380" x2="1020" y2="380" stroke="#3E77FF" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="710" y1="300" x2="1020" y2="300" stroke="#3E77FF" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.25"/>
  <line x1="710" y1="220" x2="1020" y2="220" stroke="#3E77FF" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.25"/>

  <!-- Arrow from map to panel -->
  <line x1="610" y1="315" x2="668" y2="315" stroke="#91c1ff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <polygon points="664,308 682,315 664,322" fill="#91c1ff" opacity="0.4"/>
</svg>
