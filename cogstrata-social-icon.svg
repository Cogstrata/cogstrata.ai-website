<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#060e1f"/>
    </radialGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wordGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ambient background particles -->
    <radialGradient id="particleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3E77FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3E77FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep dark background -->
  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="bgGrid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#91c1ff" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="1200" fill="url(#bgGrid)"/>

  <!-- Clean background - no ambient spots -->

  <!-- === CONSTELLATION LOGO (scaled up, centred at 600, 440) === -->
  <g transform="translate(600, 440) scale(8.5)">
    <!-- Offset to centre the 48×48 viewBox: translate by -24, -24 -->
    <g transform="translate(-24, -24)">
      <!-- Connection lines -->
      <line x1="10" y1="10" x2="22" y2="24" stroke="#91c1ff" stroke-width="1.2" opacity="0.6"/>
      <line x1="22" y1="24" x2="10" y2="37" stroke="#91c1ff" stroke-width="1.2" opacity="0.6"/>
      <line x1="22" y1="24" x2="34" y2="14" stroke="#91c1ff" stroke-width="1.2" opacity="0.6"/>
      <line x1="22" y1="24" x2="34" y2="34" stroke="#91c1ff" stroke-width="1.8" opacity="0.7"/>
      <line x1="34" y1="34" x2="43" y2="27" stroke="#91c1ff" stroke-width="1.5" opacity="0.65"/>

      <!-- Primary nodes (cogstrata blue) -->
      <circle cx="10" cy="10" r="3.5" fill="none" stroke="#3E77FF" stroke-width="1.5"/>
      <circle cx="10" cy="10" r="1.5" fill="#3E77FF"/>
      <circle cx="10" cy="37" r="3.5" fill="none" stroke="#3E77FF" stroke-width="1.5"/>
      <circle cx="10" cy="37" r="1.5" fill="#3E77FF"/>
      <circle cx="34" cy="14" r="3.5" fill="none" stroke="#3E77FF" stroke-width="1.5"/>
      <circle cx="34" cy="14" r="1.5" fill="#3E77FF"/>

      <!-- Central hub -->
      <circle cx="22" cy="24" r="6" fill="none" stroke="#3E77FF" stroke-width="2"/>
      <circle cx="22" cy="24" r="2.5" fill="#3E77FF"/>

      <!-- Secondary nodes (cogstrata mid) -->
      <circle cx="34" cy="34" r="4.5" fill="none" stroke="#91c1ff" stroke-width="1.8"/>
      <circle cx="34" cy="34" r="1.8" fill="#91c1ff"/>
      <circle cx="43" cy="27" r="3" fill="none" stroke="#91c1ff" stroke-width="1.5"/>
      <circle cx="43" cy="27" r="1.2" fill="#91c1ff"/>
    </g>
  </g>

  <!-- Decorative outer constellation fragments (faint, atmospheric) -->
  <g opacity="0.12" stroke="#91c1ff" stroke-width="1" fill="none">
    <line x1="160" y1="280" x2="240" y2="350"/>
    <circle cx="160" cy="280" r="4" fill="#3E77FF" opacity="0.3"/>
    <line x1="960" y1="320" x2="1020" y2="260"/>
    <circle cx="1020" cy="260" r="3.5" fill="#3E77FF" opacity="0.3"/>
    <line x1="200" y1="620" x2="270" y2="580"/>
    <circle cx="200" cy="620" r="3" fill="#91c1ff" opacity="0.3"/>
    <line x1="980" y1="580" x2="1040" y2="540"/>
    <circle cx="1040" cy="540" r="3.5" fill="#91c1ff" opacity="0.3"/>
  </g>

  <!-- Wordmark: "cogstrata" -->
  <text x="600" y="720" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', 'Helvetica Neue', sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="2">cogstrata</text>

  <!-- Tagline -->
  <text x="600" y="775" text-anchor="middle" font-family="'DM Sans', 'Segoe UI', 'Helvetica Neue', sans-serif" font-weight="300" font-size="26" fill="#91c1ff" letter-spacing="4" text-transform="uppercase" opacity="0.7">AI-POWERED DATA INTELLIGENCE</text>

  <!-- Subtle brand line beneath -->
  <line x1="460" y1="810" x2="740" y2="810" stroke="url(#bgGrad)" stroke-width="1"/>
  <line x1="460" y1="810" x2="740" y2="810" stroke="#3E77FF" stroke-width="1" opacity="0.2"/>

  <!-- Website URL -->
  <text x="600" y="845" text-anchor="middle" font-family="'DM Sans', 'Segoe UI', 'Helvetica Neue', sans-serif" font-weight="400" font-size="20" fill="#91c1ff" opacity="0.4" letter-spacing="1.5">cogstrata.ai</text>
</svg>